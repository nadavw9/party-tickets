<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>קניית כרטיסים - חוגגים את החיים</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      direction: rtl;
    }
    
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    
    .lock-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: all 0.2s;
    }
    
    .lock-btn:active {
      transform: scale(0.9);
      background: rgba(255,255,255,0.3);
    }
    
    .card {
      background: white;
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    
    h1 {
      color: #333;
      text-align: center;
      margin-bottom: 8px;
      font-size: 32px;
    }
    
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 15px;
    }
    
    .sold-out-banner {
      background: #ffebee;
      border: 2px solid #d32f2f;
      color: #d32f2f;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 20px;
      display: none;
    }
    
    .sold-out-banner.show {
      display: block;
    }
    
    .tickets-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 30px;
    }
    
    .ticket-btn {
      padding: 20px;
      border: 2px solid #e0e0e0;
      background: white;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
    }
    
    .ticket-btn:hover {
      border-color: #667eea;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.2);
    }
    
    .ticket-btn.active {
      border-color: #667eea;
      background: #f3f4ff;
    }
    
    .ticket-price {
      font-size: 28px;
      font-weight: bold;
      color: #667eea;
      margin-bottom: 8px;
    }
    
    .ticket-desc {
      font-size: 13px;
      color: #666;
      line-height: 1.4;
    }
    
    .selected-display {
      text-align: center;
      color: #667eea;
      font-weight: bold;
      margin-bottom: 25px;
      font-size: 16px;
      display: none;
    }
    
    .selected-display.show {
      display: block;
    }
    
    .form-field {
      margin-bottom: 18px;
    }
    
    label {
      display: block;
      color: #333;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 14px;
    }
    
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-family: inherit;
      font-size: 16px;
      direction: rtl;
    }
    
    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .qty-control {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: center;
      margin-top: 10px;
    }
    
    .qty-btn {
      width: 40px;
      height: 40px;
      border: 1px solid #ddd;
      background: white;
      border-radius: 6px;
      cursor: pointer;
      font-size: 18px;
      transition: all 0.2s;
    }
    
    .qty-btn:active {
      border-color: #667eea;
      color: #667eea;
    }
    
    .qty-display {
      min-width: 45px;
      text-align: center;
      font-weight: bold;
      font-size: 18px;
      color: #333;
    }
    
    .submit-btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      margin-top: 25px;
      transition: all 0.3s;
    }
    
    .submit-btn:active:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }
    
    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .message {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
      font-size: 14px;
    }
    
    .error {
      background: #ffebee;
      color: #d32f2f;
      border: 1px solid #ef5350;
    }
    
    .success {
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #66bb6a;
    }
    
    .message.show {
      display: block;
    }
    
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.6);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    
    .modal.show {
      display: flex;
    }
    
    .modal-box {
      background: white;
      padding: 30px;
      border-radius: 15px;
      max-width: 500px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      direction: rtl;
    }
    
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }
    
    .modal-title {
      color: #333;
      font-size: 22px;
      font-weight: bold;
    }
    
    .close-btn {
      background: none;
      border: none;
      font-size: 28px;
      color: #999;
      cursor: pointer;
    }
    
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 25px;
    }
    
    .stat {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
    }
    
    .stat-label {
      color: #666;
      font-size: 12px;
      margin-bottom: 6px;
    }
    
    .stat-value {
      font-size: 24px;
      font-weight: bold;
      color: #333;
    }
    
    .registrations {
      margin-bottom: 25px;
    }
    
    .registrations-title {
      color: #333;
      font-weight: bold;
      margin-bottom: 12px;
    }
    
    .reg-item {
      background: #f8f9fa;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 6px;
      font-size: 13px;
      color: #333;
    }
    
    .reg-type {
      color: #667eea;
      font-weight: bold;
    }
    
    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    
    .modal-btn {
      padding: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    .btn-primary:active {
      transform: translateY(-1px);
    }
    
    .btn-secondary {
      background: #f5f5f5;
      color: #333;
      border: 1px solid #ddd;
    }
    
    .btn-secondary:active {
      background: #efefef;
    }
    
    .empty-msg {
      color: #999;
      text-align: center;
      font-size: 13px;
      padding: 20px;
    }
  </style>
</head>
<body>

<button class="lock-btn" onclick="askPassword()">🔐</button>

<div class="container">
  <div class="card">
    <h1>🎉 קניית כרטיסים</h1>
    <p class="subtitle">בחר כרטיס וספק פרטים</p>
    
    <div id="soldOutBanner" class="sold-out-banner">
      סוגרים מכירות! 🎊<br>כל 90 כרטיסים נמכרו
    </div>
    
    <div id="formArea" style="display:block;">
      <div id="errorMsg" class="message error"></div>
      <div id="successMsg" class="message success"></div>
      
      <div class="tickets-container">
        <button class="ticket-btn" onclick="selectTicket('drinks')">
          <div class="ticket-price">₪120</div>
          <div class="ticket-desc">משקאות חינם + כניסה</div>
        </button>
        <button class="ticket-btn" onclick="selectTicket('entry')">
          <div class="ticket-price">₪80</div>
          <div class="ticket-desc">כרטיס כניסה</div>
        </button>
      </div>
      
      <div id="selectedDisplay" class="selected-display"></div>
      
      <div class="form-field">
        <label>שם מלא</label>
        <input type="text" id="nameInput" placeholder="הזן את שמך">
      </div>
      
      <div class="form-field">
        <label>מספר טלפון</label>
        <input type="tel" id="phoneInput" placeholder="0501234567">
      </div>
      
      <div class="form-field">
        <label>כמות כרטיסים</label>
        <div class="qty-control">
          <button class="qty-btn" onclick="decreaseQty()">−</button>
          <div class="qty-display" id="qtyNum">1</div>
          <button class="qty-btn" onclick="increaseQty()">+</button>
        </div>
      </div>
      
      <button class="submit-btn" onclick="buyTickets()" id="buyBtn">בחר כרטיס</button>
    </div>
  </div>
</div>

<div id="adminModal" class="modal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title">🔑 פנל ניהול</div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    
    <div class="stats">
      <div class="stat">
        <div class="stat-label">סה"כ כרטיסים</div>
        <div class="stat-value" id="statTotal">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">סכום כולל</div>
        <div class="stat-value" id="statRevenue">₪0</div>
      </div>
      <div class="stat">
        <div class="stat-label">משקאות</div>
        <div class="stat-value" id="statDrinks">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">כניסה</div>
        <div class="stat-value" id="statEntry">0</div>
      </div>
    </div>
    
    <div class="registrations">
      <div class="registrations-title">הרשומים</div>
      <div id="regList"></div>
    </div>
    
    <div class="modal-actions">
      <button class="modal-btn btn-primary" onclick="downloadExcel()">📊 הורד Excel</button>
      <button class="modal-btn btn-secondary" onclick="resetAll()">🔄 איפוס</button>
    </div>
  </div>
</div>

<script>
const ADMIN_PASSWORD = '8074345Nw!';
const MAX_TICKETS = 90;
const FIREBASE_URL = 'https://lanedefense-analytics-default-rtdb.firebaseio.com/party-tickets';

let data = {
  selected: null,
  qty: 1,
  registrations: []
};

async function init() {
  await loadData();
  updateUI();
}

async function loadData() {
  try {
    const res = await fetch(`${FIREBASE_URL}/registrations.json`);
    if (res.ok) {
      data.registrations = await res.json() || [];
    }
  } catch (e) {
    const stored = localStorage.getItem('tickets');
    if (stored) data.registrations = JSON.parse(stored);
  }
}

async function saveData() {
  localStorage.setItem('tickets', JSON.stringify(data.registrations));
  try {
    await fetch(`${FIREBASE_URL}/registrations.json`, {
      method: 'PUT',
      body: JSON.stringify(data.registrations)
    });
  } catch (e) {
    console.log('Saved locally');
  }
}

function selectTicket(type) {
  data.selected = type;
  updateUI();
}

function increaseQty() {
  data.qty++;
  updateUI();
}

function decreaseQty() {
  if (data.qty > 1) data.qty--;
  updateUI();
}

function updateUI() {
  const total = data.registrations.length;
  const isSoldOut = total >= MAX_TICKETS;
  
  document.getElementById('soldOutBanner').classList.toggle('show', isSoldOut);
  document.getElementById('formArea').style.display = isSoldOut ? 'none' : 'block';
  
  document.querySelectorAll('.ticket-btn').forEach(b => b.classList.remove('active'));
  if (data.selected) {
    document.querySelector(`.ticket-btn[onclick*="${data.selected}"]`).classList.add('active');
  }
  
  document.getElementById('qtyNum').textContent = data.qty;
  
  const names = { drinks: 'משקאות (₪120)', entry: 'כניסה (₪80)' };
  const prices = { drinks: 120, entry: 80 };
  
  if (data.selected) {
    const total = prices[data.selected] * data.qty;
    document.getElementById('selectedDisplay').textContent = `${names[data.selected]} × ${data.qty} = ₪${total}`;
    document.getElementById('selectedDisplay').classList.add('show');
    document.getElementById('buyBtn').textContent = `תשלום ₪${total}`;
  } else {
    document.getElementById('selectedDisplay').classList.remove('show');
    document.getElementById('buyBtn').textContent = 'בחר כרטיס';
  }
  
  updateStats();
}

function updateStats() {
  const total = data.registrations.length;
  const drinks = data.registrations.filter(r => r.type === 'drinks').length;
  const entry = data.registrations.filter(r => r.type === 'entry').length;
  const revenue = data.registrations.reduce((s, r) => s + r.price, 0);
  
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statDrinks').textContent = drinks;
  document.getElementById('statEntry').textContent = entry;
  document.getElementById('statRevenue').textContent = '₪' + revenue;
  
  const html = data.registrations.map(r => 
    `<div class="reg-item"><strong>${r.name}</strong> | ${r.phone} | <span class="reg-type">${r.type === 'drinks' ? 'משקאות' : 'כניסה'}</span></div>`
  ).join('') || '<div class="empty-msg">אין רשומים עדיין</div>';
  document.getElementById('regList').innerHTML = html;
}

function showMsg(el, msg) {
  document.getElementById(el).textContent = msg;
  document.getElementById(el).classList.add('show');
  setTimeout(() => document.getElementById(el).classList.remove('show'), 5000);
}

function askPassword() {
  const pwd = prompt('הזן סיסמה');
  if (pwd === ADMIN_PASSWORD) {
    openModal();
  } else if (pwd !== null) {
    alert('סיסמה שגויה');
  }
}

function openModal() {
  document.getElementById('adminModal').classList.add('show');
  updateStats();
}

function closeModal() {
  document.getElementById('adminModal').classList.remove('show');
}

async function buyTickets() {
  const name = document.getElementById('nameInput').value.trim();
  const phone = document.getElementById('phoneInput').value.trim();
  
  if (!name) { showMsg('errorMsg', 'הזן שם'); return; }
  if (!phone) { showMsg('errorMsg', 'הזן טלפון'); return; }
  if (!data.selected) { showMsg('errorMsg', 'בחר כרטיס'); return; }
  
  const prices = { drinks: 120, entry: 80 };
  for (let i = 0; i < data.qty; i++) {
    data.registrations.push({
      name,
      phone,
      type: data.selected,
      price: prices[data.selected],
      time: new Date().toISOString()
    });
  }
  
  await saveData();
  showMsg('successMsg', `✅ ${data.qty} כרטיסים נקנו!`);
  
  document.getElementById('nameInput').value = '';
  document.getElementById('phoneInput').value = '';
  data.qty = 1;
  data.selected = null;
  updateUI();
  
  setTimeout(() => {
    window.location.href = 'https://links.payboxapp.com/UibbqwiWR2b';
  }, 1500);
}

function downloadExcel() {
  const rows = [
    ['שם', 'טלפון', 'סוג', 'מחיר', 'תאריך'],
    ...data.registrations.map(r => [
      r.name,
      r.phone,
      r.type === 'drinks' ? 'משקאות' : 'כניסה',
      '₪' + r.price,
      new Date(r.time).toLocaleString('he-IL')
    ])
  ];
  
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{ wch: 15 }, { wch: 12 }, { wch: 12 }, { wch: 8 }, { wch: 18 }];
  
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'כרטיסים');
  XLSX.writeFile(wb, 'party-tickets.xlsx');
}

function resetAll() {
  if (confirm('מחק את כל הנתונים?')) {
    data.registrations = [];
    saveData();
    updateStats();
    showMsg('successMsg', 'נתונים נמחקו');
  }
}

init();
</script>

</body>
</html>
